# Use Ctrl-a as the prefix.
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Split panes and create windows in the current pane's directory.
unbind '"'
bind - split-window -v -c '#{pane_current_path}'
unbind %
bind | split-window -h -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Reload this file without restarting the server.
bind r source-file ~/.tmux.conf \; display-message 'tmux config reloaded'

# Interaction.
set -g mouse on
set -g set-clipboard external
set -sg escape-time 10
set -g focus-events on
set -g history-limit 50000

# Move between panes with hjkl.
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Resize with prefix + Ctrl-h/j/k/l.
bind -r C-k resize-pane -U 2
bind -r C-j resize-pane -D 2
bind -r C-h resize-pane -L 2
bind -r C-l resize-pane -R 2

# Vi-style copy mode. Platform clipboard bindings are installed below.
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g status-interval 5
set -g status-justify left
setw -g monitor-activity on

# Advertise tmux's terminal capabilities and RGB support.
set -g default-terminal tmux-256color
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',screen-256color:RGB'

run-shell 'bash ~/.tmux.conf.sh'
