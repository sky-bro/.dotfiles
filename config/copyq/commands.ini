2\Command="
    copyq:
    var suffices = {
      'image/svg': 'svg',
      'image/png': 'png',
      'image/jpeg': 'jpg',
      'image/jpg': 'jpg',
      'image/bmp': 'bmp',
      'text/html': 'html',
      'text/plain': 'txt',
    }

    function hasSuffix(fileName)
    {
      return /\.[0-9a-zA-Z]+$/.test(fileName);
    }

    function addSuffix(fileName, format)
    {
      var suffix = suffices[format]
      return suffix ? fileName + \".\" + suffix : fileName
    }

    function filterFormats(format)
    {
      return /^[a-z]/.test(format) && !/^application\/x/.test(format)
    }

    function itemFormats(row)
    {
      return str(read('?', row))
        .split('\n')
        .filter(filterFormats)
    }

    function formatPriority(format)
    {
      var keys = Object.keys(suffices);
      var index = keys.indexOf(format);
      return index === -1 ? keys.length : index
    }

    function reorderFormats(formats)
    {
      formats.sort(function(left, right) {
        var leftPriority = formatPriority(left);
        var rightPriority = formatPriority(right);
        return leftPriority === rightPriority
          ? left.localeCompare(right)
          : leftPriority - rightPriority;
      })
    }

    if (selectedtab()) tab(selectedtab())
    var row = selectedtab() ? currentitem() : -1
    var formats = itemFormats(row)
    reorderFormats(formats)

    currentpath(Dir().homePath())
    var defaultFileName = 'untitled'
    var keyFormat = 'Format'
    var keyFileName = 'File'
    var defaultFormat = formats[0]

    var result = dialog(
      '.title', 'Save Item As...',
      '.width', 250,
      keyFormat, [defaultFormat].concat(formats),
      keyFileName, File(defaultFileName)
    ) || abort()

    var fileName = result[keyFileName]
    var format = result[keyFormat]

    if (!format || !fileName)
      abort()

    if (!hasSuffix(fileName))
      fileName = addSuffix(fileName, format)

    var file = File(fileName)
    if (!file.open()) {
      popup('Failed to open \"' + file.fileName() + '\"', file.errorString())
      abort()
    }

    file.write(selectedtab() ? getitem(currentitem())[format] : clipboard(format))
    popup('Item Saved', 'Item saved as \"' + file.fileName() + '\".')"
2\GlobalShortcut=ctrl+alt+s
2\Icon=
2\InMenu=true
2\IsGlobalShortcut=true
2\Name=Save As...
3\Automatic=true
3\Command="
    copyq:
    const imageTab = '&Images';

    function hasImageFormat(formats) {
      for (const format of formats.values()) {
        if (format.startsWith('image/'))
          return true;
      }
      return false;
    }

    const formats = dataFormats();
    if (hasImageFormat(formats))
      setData(mimeOutputTab, imageTab);"
3\Icon=
3\Name=Image Tab
size=3
